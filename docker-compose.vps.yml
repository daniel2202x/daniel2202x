name: code-server

secrets:
  code-server-password:
    environment: CODE_SERVER_PASSWORD
  namecheap-api-key:
    environment: NAMECHEAP_API_KEY

volumes:
  swag_etc:
  swag_keys:

services:
  code-server:
    container_name: code-server
    restart: always
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    network_mode: host
    build:
      pull: true
      secrets:
        - code-server-password
      dockerfile_inline: |
        FROM debian:latest
        RUN apt update && apt install -y --no-install-recommends \
                ca-certificates \
                curl \
                htop \
                jq \
                tree \
                unzip \
                wget \
                zip \
              && rm -rf /var/lib/apt/lists/*
        RUN curl -fsSL https://get.docker.com | sh
        RUN curl -fsSL https://deb.nodesource.com/setup_24.x | bash && \
              apt install -y --no-install-recommends nodejs && rm -rf /var/lib/apt/lists/*
        RUN git config --global user.email "d.landgraf2000@icloud.com" && \
            git config --global user.name "daniel2202x" && \
            git config --global pull.rebase false
        RUN curl -fsSL https://code-server.dev/install.sh | sh && \
              code-server --install-extension angular.ng-template \
                          --install-extension dbaeumer.vscode-eslint \
                          --install-extension esbenp.prettier-vscode
        RUN cat << EOF > /root/.local/share/code-server/User/settings.json
        {
          "workbench.colorTheme": "Default Dark+",
          "git.enableSmartCommit": true,
          "git.confirmSync": false,
          "git.autofetch": true,
          "[typescript]": {
            "editor.defaultFormatter": "esbenp.prettier-vscode"
          }
        }
        EOF
        RUN --mount=type=secret,id=code-server-password,required=true \
        cat << EOF > /root/.config/code-server/config.yaml
        bind-addr: 0.0.0.0:81
        auth: password
        password: "$(cat /run/secrets/code-server-password)"
        cert: false
        EOF
        ENTRYPOINT ["code-server"]

  swag:
    container_name: swag
    restart: always
    build:
      pull: true
      secrets:
        - namecheap-api-key
      dockerfile_inline: |
        FROM linuxserver/swag:latest
        RUN --mount=type=secret,id=namecheap-api-key,required=true \
              echo "dns_namecheap_username=dlandgraf" > /defaults/dns-conf/namecheap.ini && \
              echo "dns_namecheap_api_key=$(cat /run/secrets/namecheap-api-key)" >> /defaults/dns-conf/namecheap.ini
        RUN cat << 'EOF' > /defaults/nginx/site-confs/default.conf.sample
        server {
            listen 80 default_server;
            listen [::]:80 default_server;
            location / {
                return 301 https://$$host$$request_uri;
            }
        }
        server {
            listen 443 ssl default_server;
            listen [::]:443 ssl default_server;
            server_name _;
            include /config/nginx/ssl.conf;
            location / {
              proxy_pass http://host.docker.internal:81/;
              proxy_set_header Host $$http_host;
              proxy_set_header Upgrade $$http_upgrade;
              proxy_set_header Connection upgrade;
              proxy_set_header Accept-Encoding gzip;
            }
        }
        EOF
    ports:
      - 80:80
      - 443:443
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      PUID: 1000
      PGID: 1000
      TZ: UTC
      URL: dev.fluently.to
      VALIDATION: dns
      DNSPLUGIN: namecheap
    volumes:
      - swag_etc:/config/etc
      - swag_keys:/config/keys
